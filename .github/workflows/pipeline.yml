name: Deployment pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # BACKEND

      - name: Setup backend
        working-directory: ./phonebook-backend
        run: npm install

      - name: Backend lint
        working-directory: ./phonebook-backend
        run: npm run lint

      - name: Backend test
        working-directory: ./phonebook-backend
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: npm test

      # FRONTEND

      - name: Setup frontend
        working-directory: ./phonebook-frontend
        run: npm install

      - name: Frontend lint
        working-directory: ./phonebook-frontend
        run: npm run lint

      - name: Frontend test
        working-directory: ./phonebook-frontend
        run: npm test -- --run

      - name: Frontend build
        working-directory: ./phonebook-frontend
        run: npm run build

      # COPY DIST TO BACKEND

      - name: Copy frontend build to backend
        run: |
          rm -rf phonebook-backend/dist
          cp -r phonebook-frontend/dist phonebook-backend/dist

      # DEPLOY

      - name: Trigger Render deploy
        if: ${{ github.event_name == 'push' }}
        run: |
          curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
